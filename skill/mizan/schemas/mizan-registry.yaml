# =====================================================================
# Mizan Registry Schema v1.0  (mizan-registry.yaml)
# =====================================================================
# Machine-readable research/engineering registry aligned with the Mizan
# methodology. Human-editable, AI-readable, git-diff friendly.
#
# HARD RULES (validators and AI agents must enforce):
#   R1. A hypothesis MUST have threshold + refutation BEFORE any result
#       references it. (No HARKing by construction.)
#   R2. experiment.baseline is MANDATORY. "none" is allowed ONLY with a
#       written justification; a result based on a baseline-less
#       experiment can NEVER promote a hypothesis to tier K.
#   R3. experiment.confound_controls is MANDATORY: every confound listed
#       in the hypothesis is either controlled (say how) or explicitly
#       accepted as a risk (say why).
#   R4. History is append-only. Refuted entries are never deleted;
#       tier R is a terminal-but-visible state.
#   R5. result.honesty_annexes is MANDATORY and non-empty.
#   R6. If result.surprising_positive is true, promotion to K requires
#       a completed confound_control_result (or a preregistered
#       sub-entry for it). The headline waits.
#   R7. Producer/auditor separation: the agent that writes results
#       SHOULD NOT be the sole agent that promotes tiers; tier changes
#       are proposed, then confirmed by the owner or an audit pass.
#   R8. Every hypothesis MUST name its arbiter — the thing that returns
#       the verdict on the locked threshold. A threshold whose arbiter is
#       the claim's own author is self-report, not measurement:
#         class runtime | instrument | third_party -> K-promotion open
#         class author  -> K FORBIDDEN; the entry carries a permanent KKE
#         class none    -> the threshold is decorative; tier stays S
#       Enforced from schema_version 1.2 onward (see SCHEMA VERSIONS).
#
# Tiers: K (proven) | H (plausible hypothesis) | S (speculative)
#        R (refuted) | KKE (critical control missing) | Y (misleading)
#
# SCHEMA VERSIONS:
#   1.0 — base format.
#   1.1 — adds an OPTIONAL result.statistics block (effect_size, n,
#         uncertainty, seeds_variance) for machine-readable meta-analysis.
#         Backward compatible: v1.0 files remain valid; the block is opt-in
#         and never forced (forcing it would push fabricated numbers — the
#         opposite of the honesty-annex principle). See FEAT-M002 in the
#         project roadmap registry — this field ships; whether it earns
#         its place stays GATED pending real migration data.
#   1.2 — adds hypothesis.arbiter (rule R8). MANDATORY for files declaring
#         schema_version 1.2+; 1.0/1.1 files stay valid and unenforced, so
#         existing registries migrate deliberately rather than breaking.
#         Rationale: the code-verification loop gets its force from an
#         arbiter external to the author (the runtime), not from the fact
#         that the artifact is code. Off-code domains keep the protocol but
#         silently lose the arbiter; this block makes that loss visible per
#         entry, instead of letting a locked-looking threshold imply an
#         oracle that does not exist.
# =====================================================================

registry:
  project: "ProjectName"            # e.g. SpectralLM
  owner: "XINMurat"
  schema_version: "1.2"             # 1.2+ activates R8 (arbiter) enforcement
  methodology: "mizan-v2"           # the installed skill version
  created: "2026-07-10"
  notes: >
    Optional free text: scope of this registry, links to project docs.

# ---------------------------------------------------------------------
# HYPOTHESIS — written BEFORE the test runs (R1)
# ---------------------------------------------------------------------
hypotheses:
  - id: "H-001"
    version: 1                      # bump on revision; old versions stay in history
    tier: "H"                       # current evidence tier
    status: "preregistered"         # preregistered | testing | closed
    preregistered: "2026-07-10"
    title: "Short name"
    formal: >
      The claim as a precise, testable statement.
    origin: >
      Where it came from: user intuition / prior result (ref id) /
      external AI suggestion (which) / literature.
    metric:
      name: "perplexity_improvement"
      instrument: "script/path or query — the thing that produces the number"
    arbiter:                        # MANDATORY from schema 1.2 (R8)
      # WHO returns the verdict on the threshold below — not who measures,
      # who DECIDES. Pick the weakest class that honestly applies.
      #   runtime      — deterministic executor; same input, same verdict,
      #                  no judgment (test suite, compiler, checksum, solver)
      #   instrument   — a measurement independent of the author's opinion
      #                  but requiring setup/interpretation (benchmark script,
      #                  query over data the author does not control)
      #   third_party  — a judge other than the claim's author (reviewer,
      #                  user cohort, market outcome, downstream system)
      #   author       — the claim's author (human or model) judging its own
      #                  claim. Legitimate and often unavoidable; it just
      #                  cannot yield K. Permanent KKE, stated as such.
      #   none         — no arbiter exists. Then the numeric threshold is
      #                  theatre; say so and leave the entry at S.
      class: "instrument"
      who: "the concrete judge — script path, person/role, system, cohort"
      independent_of_author: true   # false is only coherent for author/none
      latency: "how long until a verdict EXISTS: seconds | days | quarters |
                never (the last one is class: none in disguise)"
      calibration: >
        Where this threshold's null comes from — MANDATORY for class
        instrument/third_party. The number must be derived from THIS
        arbiter's own null distribution; thresholds are not inherited
        across instruments (Kıyas AD1/A3). "unknown" is an honest answer
        and forces an honesty annex on every result that uses it.
    threshold:                      # LOCKED now, numeric (R1)
      support: ">= 5%"
      refute: "< 1%"
      underpowered: "1%..5% -> one rerun allowed; state what changes"
    refutation: >
      What result kills this hypothesis.
    two_sided: >
      What EACH outcome teaches. If only success is informative,
      redesign before registering.
    informativeness_precondition: >
      What must hold for the test to count at all (else: cell_closed).
    preregistered_prediction: >
      Optional: author's expectation, written before the result.
    prior_art:
      - "Known relatives; where the originality claim actually lives"
    confounds:                      # feeds R3 — experiments must answer these
      - parameter_count
      - initialization
    relations:                      # keep the small verb set
      depends_on: []                # ids
      contradicts: []
      refines: []                   # e.g. "H-001@v1"
    cost: "rough effort estimate"
    history:                        # append-only (R4)
      - { date: "2026-07-10", event: "preregistered v1" }

# ---------------------------------------------------------------------
# EXPERIMENT — the test as actually run
# ---------------------------------------------------------------------
experiments:
  - id: "EXP-001"
    hypotheses: ["H-001"]
    design: >
      What is done, in one paragraph.
    materials:
      dataset: "WikiText-2"
      model: "..."
      seeds: [42]                   # list; single seed => must appear in honesty annexes
      config: "path or inline"
    baseline:                       # MANDATORY (R2)
      description: "Parameter-matched vanilla variant / control arm"
      # If genuinely none:
      # description: "none"
      # justification: "why a comparison object is impossible here"
    confound_controls:              # MANDATORY (R3) — answer the hypothesis' confound list
      - confound: parameter_count
        control: "both arms matched to ±1% params"
      - confound: initialization
        control: "accepted risk — single init; rationale: ..."
    status: "planned"               # planned | running | completed | cell_closed
    raw_output: "path/to/logs"

# ---------------------------------------------------------------------
# RESULT — appended, never edited (R4)
# ---------------------------------------------------------------------
results:
  - id: "RES-001"
    experiment: "EXP-001"
    hypothesis: "H-001"
    date: "2026-07-XX"
    measured: >
      Values verbatim, no interpretation in this field.
    threshold_met: "yes"            # yes | no | precondition_failed
    surprising_positive: false      # true triggers R6
    # OPTIONAL (schema v1.1) — fill only where a real number exists; leave
    # the whole block out rather than inventing values (honesty over coverage).
    statistics:
      effect_size: ""               # e.g. "-6.75% ppl (relative)"
      n: ""                         # e.g. "2 seeds" / "1 dataset"
      uncertainty: ""               # e.g. "±0.4% across seeds", CI, or "unknown"
      seeds_variance: ""            # per-seed spread if multi-seed, else omit
    confound_control_result: >
      Mandatory before K-promotion when surprising_positive: the
      symmetric control run and its outcome, or the id of a
      preregistered sub-entry for it.
    decision: "propose H->K"        # propose H->K | propose H->R |
                                    # cell_closed | underpowered_rerun
    decision_confirmed_by: ""       # owner/audit pass (R7); empty = pending
    honesty_annexes:                # MANDATORY, non-empty (R5)
      - "n=1 dataset, single seed"
      - "instrument dependence: ..."
    post_hoc_reasoning: >
      Allowed, but labeled: anything reasoned AFTER seeing the result.
    followup: []                    # new hypothesis/experiment ids

# ---------------------------------------------------------------------
# OPTIONAL BLOCKS — same rules, specialized fields
# ---------------------------------------------------------------------
# Bug hypotheses (Mode 4): add symptom / mechanism / rival_hypotheses /
#   refutation_test; "fix worked" follows R6 (revert-check as the
#   symmetric control). Arbiter is usually class: runtime (the failing
#   test / repro script) — the one place the code loop already holds.
# Feature gates (Mode 5): add problem_claim (with tier+source),
#   value_metric, success_threshold, kill_condition, alternatives
#   (>=1 cheaper + null alternative), acceptance criteria phrased as
#   refutation conditions. The success_threshold carries its own arbiter
#   block; a value metric whose only judge is the feature's own proposer
#   is class: author and cannot reach K.
bugs: []
features: []
